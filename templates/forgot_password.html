{% extends "base.html" %}

{% block title %}Forgot Password - Student Grievance Portal{% endblock %}

{% block public_content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-header">
            <i class="fa-solid fa-key" style="font-size: 36px; color: var(--primary); margin-bottom: 12px;"></i>
            <h2>Recover Password</h2>
            <p style="font-size: 13px; color: var(--text-secondary);">Enter your email to receive recovery instructions</p>
        </div>
        
        <form action="{{ url_for('forgot_password') }}" method="post">
            <div class="form-group" style="margin-bottom: 24px;">
                <label for="forgotEmail" class="form-label">Email Address</label>
                <input type="email" name="email" id="forgotEmail" class="form-control" placeholder="john.doe@university.edu" required autocomplete="email">
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px;">Send Reset Link</button>
        </form>
        
        <div class="auth-footer">
            <span>Remembered your password?</span>
            <a href="{{ url_for('login') }}" style="font-weight: 600;">Sign In</a>
            <div style="margin-top: 12px;">
                <a href="{{ url_for('index') }}" style="font-size: 12px; color: var(--text-hint);"><i class="fa-solid fa-house"></i> Back to Homepage</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
