{% extends "base.html" %}

{% block title %}Reset Password - Student Grievance Portal{% endblock %}

{% block public_content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-header">
            <i class="fa-solid fa-lock-open" style="font-size: 36px; color: var(--primary); margin-bottom: 12px;"></i>
            <h2>Reset Password</h2>
            <p style="font-size: 13px; color: var(--text-secondary);">Create a strong new password for your account</p>
        </div>
        
        <form action="{{ url_for('reset_password', token=token) }}" method="post" id="resetPasswordForm">
            <div class="form-group">
                <label for="resetPwd" class="form-label">New Password</label>
                <div class="password-wrapper">
                    <input type="password" name="password" id="resetPwd" class="form-control" placeholder="Min. 6 characters" required minlength="6" oninput="checkStrength()">
                    <i class="fa-solid fa-eye password-toggle-icon" data-input-id="resetPwd"></i>
                </div>
                <div id="strMeter" style="height: 4px; border-radius: 2px; background-color: var(--border-color); margin-top: 6px; transition: var(--transition);"></div>
                <small id="strText" style="font-size: 11px; color: var(--text-hint); display: block; margin-top: 2px; text-align: right;"></small>
            </div>
            
            <div class="form-group" style="margin-bottom: 24px;">
                <label for="resetConfirm" class="form-label">Confirm New Password</label>
                <div class="password-wrapper">
                    <input type="password" name="confirm_password" id="resetConfirm" class="form-control" placeholder="Repeat your new password" required minlength="6" oninput="checkMatch()">
                    <i class="fa-solid fa-eye password-toggle-icon" data-input-id="resetConfirm"></i>
                </div>
                <small id="matchText" style="font-size: 11px; display: block; margin-top: 2px; text-align: right;"></small>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px;">Update Password</button>
        </form>
        
        <div class="auth-footer">
            <a href="{{ url_for('login') }}" style="font-weight: 600;"><i class="fa-solid fa-arrow-left"></i> Return to Login</a>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    function checkStrength() {
        const pwd = document.getElementById('resetPwd').value;
        const meter = document.getElementById('strMeter');
        const text = document.getElementById('strText');
        
        if (!pwd) {
            meter.style.width = '0';
            text.textContent = '';
            return;
        }
        
        let score = 0;
        if (pwd.length >= 6) score++;
        if (pwd.length >= 10) score++;
        if (/[A-Z]/.test(pwd)) score++;
        if (/[0-9]/.test(pwd)) score++;
        if (/[^A-Za-z0-9]/.test(pwd)) score++;
        
        let width = '20%';
        let color = 'var(--danger)';
        let strength = 'Weak';
        
        if (score === 2) { width = '40%'; color = '#ff9900'; strength = 'Fair'; }
        else if (score === 3) { width = '60%'; color = '#ffcc00'; strength = 'Good'; }
        else if (score === 4) { width = '80%'; color = 'var(--info)'; strength = 'Strong'; }
        else if (score === 5) { width = '100%'; color = 'var(--success)'; strength = 'Excellent'; }
        
        meter.style.width = width;
        meter.style.backgroundColor = color;
        text.textContent = `Strength: ${strength}`;
        text.style.color = color;
    }

    function checkMatch() {
        const pwd = document.getElementById('resetPwd').value;
        const confirm = document.getElementById('resetConfirm').value;
        const text = document.getElementById('matchText');
        
        if (!confirm) {
            text.textContent = '';
            return;
        }
        
        if (pwd === confirm) {
            text.textContent = 'Passwords match';
            text.style.color = 'var(--success)';
        } else {
            text.textContent = 'Passwords do not match';
            text.style.color = 'var(--danger)';
        }
    }
</script>
{% endblock %}
